[workspace]
members = ["fuzz"]
# The fuzz crate requires a nightly toolchain via `cargo-fuzz`; keep it out
# of the default set so `cargo build` / `cargo test` work on stable.
default-members = ["."]

[package]
name = "nixfmt_rs"
version = "0.1.0"
edition = "2021"
authors = ["nixfmt-rs contributors"]
description = "Rust implementation of nixfmt with exact Haskell compatibility"
license = "MIT OR Apache-2.0"
repository = "https://github.com/joerg/nixfmt-rs2"

[[bin]]
name = "nixfmt_rs"
path = "src/main.rs"

[lib]
name = "nixfmt_rs"
path = "src/lib.rs"

[dependencies]

[dev-dependencies]
criterion = "0.5"

[[bench]]
name = "parser_benchmark"
harness = false
