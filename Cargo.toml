[workspace]
members = ["fuzz"]
# The fuzz crate requires a nightly toolchain via `cargo-fuzz`; keep it out
# of the default set so `cargo build` / `cargo test` work on stable.
default-members = ["."]

[package]
name = "nixfmt_rs"
version = "0.1.0"
edition = "2024"
authors = ["nixfmt-rs contributors"]
description = "Rust implementation of nixfmt with exact Haskell compatibility"
license = "MIT OR Apache-2.0"
repository = "https://github.com/joerg/nixfmt-rs"

[[bin]]
name = "nixfmt"
path = "src/main.rs"

[lib]
name = "nixfmt_rs"
path = "src/lib.rs"

[dependencies]
memchr = "2"
compact_str = "0.9"
rayon = "1"
walkdir = "2"
mimalloc = { version = "0.1", default-features = false }

[dev-dependencies]
criterion = "0.8"
tempfile = "3"

[[bench]]
name = "parser_benchmark"
harness = false

[profile.release]
lto = "thin"
codegen-units = 1

# Lints apply to all targets (lib, bin, examples, tests, benches).
# This crate intentionally mirrors the structure of nixfmt's Haskell source
# (Types.hs / Predoc.hs / Pretty.hs) line-for-line where possible. Many of
# clippy's stylistic suggestions would diverge from that reference and make
# cross-checking harder, so they are allowed below.
[lints.clippy]
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
# Style lints intentionally kept off:
items_after_statements = "allow"
branches_sharing_code = "allow"
# Function shape follows Haskell; size/signature lints are noise here.
too_many_lines = "allow"
needless_pass_by_value = "allow"
unnecessary_wraps = "allow"
unused_self = "allow"
missing_errors_doc = "allow"
# Lexer/layout hot paths: nursery suggestions here are not always correct.
inline_always = "allow"
cast_possible_truncation = "allow"
cast_possible_wrap = "allow"
format_push_string = "allow"
needless_collect = "allow"
redundant_clone = "allow"
