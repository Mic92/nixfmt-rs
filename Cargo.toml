[workspace]
members = ["fuzz"]
# The fuzz crate requires a nightly toolchain via `cargo-fuzz`; keep it out
# of the default set so `cargo build` / `cargo test` work on stable.
default-members = ["."]

[package]
name = "nixfmt_rs"
version = "0.1.0"
edition = "2021"
authors = ["nixfmt-rs contributors"]
description = "Rust implementation of nixfmt with exact Haskell compatibility"
license = "MIT OR Apache-2.0"
repository = "https://github.com/joerg/nixfmt-rs"

[[bin]]
name = "nixfmt"
path = "src/main.rs"

[lib]
name = "nixfmt_rs"
path = "src/lib.rs"

[dependencies]
memchr = "2"
compact_str = "0.9"
rayon = "1"
walkdir = "2"
mimalloc = { version = "0.1", default-features = false }

[dev-dependencies]
criterion = "0.5"
tempfile = "3"

[[bench]]
name = "parser_benchmark"
harness = false

[profile.release]
lto = "thin"
codegen-units = 1
