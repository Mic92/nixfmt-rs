<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>nixfmt-rs · wasm playground</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="./nix-snowflake.svg" />
    <style>
      :root {
        color-scheme: dark;
        --nix-blue: #5277c3;
        --nix-cyan: #7ebae4;
        --rust-light: #eea170;
        --rust-dark: #ce5a1f;
        --bg: #0d1117;
        --panel: #161b22;
        --panel-2: #1c232c;
        --border: #2a3340;
        --text: #d8e1ee;
        --muted: #8a98ad;
        --error: #ff7b72;
        --mono: ui-monospace, "JetBrains Mono", SFMono-Regular, Menlo, Consolas, monospace;
        --grad-nix: linear-gradient(135deg, var(--nix-cyan) 0%, var(--nix-blue) 100%);
        --grad-rust: linear-gradient(135deg, var(--rust-light) 0%, var(--rust-dark) 100%);
        --grad-mix: linear-gradient(135deg, var(--nix-cyan) 0%, var(--nix-blue) 50%, var(--rust-dark) 100%);
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: "Inter", system-ui, -apple-system, sans-serif;
        background:
          radial-gradient(1200px 600px at 10% -10%, rgba(126, 186, 228, 0.10), transparent 60%),
          radial-gradient(900px 500px at 100% 0%, rgba(206, 90, 31, 0.10), transparent 60%),
          var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
      }

      header {
        display: flex;
        align-items: center;
        gap: 0.85rem;
        padding: 0.85rem 1.25rem;
        border-bottom: 1px solid var(--border);
        background: linear-gradient(180deg, rgba(82, 119, 195, 0.08), transparent);
      }
      .logo {
        width: 36px;
        height: 36px;
        flex-shrink: 0;
        filter: drop-shadow(0 0 12px rgba(126, 186, 228, 0.25));
      }
      .title {
        display: flex;
        flex-direction: column;
        line-height: 1.1;
      }
      .title .name {
        font-weight: 600;
        font-size: 1.05rem;
        letter-spacing: 0.2px;
      }
      .title .name b {
        background: var(--grad-rust);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .title .sub {
        font-size: 0.78rem;
        color: var(--muted);
        margin-top: 2px;
      }
      header .spacer { flex: 1; }
      header a {
        color: var(--muted);
        text-decoration: none;
        font-size: 0.85rem;
        padding: 0.35rem 0.7rem;
        border: 1px solid var(--border);
        border-radius: 999px;
        transition: color 0.15s, border-color 0.15s;
      }
      header a:hover {
        color: var(--rust-light);
        border-color: var(--rust-light);
      }

      .controls {
        display: flex;
        gap: 1rem;
        align-items: center;
        flex-wrap: wrap;
        padding: 0.7rem 1.25rem;
        border-bottom: 1px solid var(--border);
        background: var(--panel);
      }
      .controls label {
        display: flex;
        gap: 0.4rem;
        align-items: center;
        font-size: 0.85rem;
        color: var(--muted);
      }
      input[type="number"] {
        width: 4.5rem;
        padding: 0.3rem 0.5rem;
        font-family: var(--mono);
        font-size: 0.85rem;
        background: var(--panel-2);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 4px;
        outline: none;
      }
      input[type="number"]:focus { border-color: var(--nix-cyan); }
      input[type="checkbox"] { accent-color: var(--rust-dark); }
      textarea:focus, pre:focus-within { outline: none; }
      .pane.input { box-shadow: inset 3px 0 0 -1px var(--nix-blue); }
      .pane.output { box-shadow: inset -3px 0 0 -1px var(--rust-dark); }

      button {
        padding: 0.4rem 1rem;
        font-size: 0.85rem;
        font-weight: 500;
        color: white;
        background: var(--grad-rust);
        border: none;
        border-radius: 4px;
        cursor: pointer;
        transition: filter 0.15s, transform 0.05s;
      }
      button:hover { filter: brightness(1.1); }
      button:active { transform: translateY(1px); }

      .status {
        margin-left: auto;
        font-size: 0.78rem;
        color: var(--muted);
        font-family: var(--mono);
      }
      .status.error { color: var(--error); }
      .status .dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--muted);
        margin-right: 0.4rem;
        vertical-align: middle;
      }
      .status.ready .dot { background: var(--rust-light); }
      .status.error .dot { background: var(--error); }
      .status.loading .dot {
        background: var(--nix-cyan);
        animation: pulse 1.2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }

      main {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1px;
        background: var(--border);
        min-height: 0;
      }
      .pane {
        display: flex;
        flex-direction: column;
        background: var(--panel);
        min-height: 0;
      }
      .pane-header {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        padding: 0.5rem 0.85rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .pane-header::before {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--nix-cyan);
      }
      .pane.output .pane-header::before { background: var(--rust-dark); }

      textarea, pre {
        flex: 1;
        width: 100%;
        font-family: var(--mono);
        font-size: 13px;
        line-height: 1.55;
        padding: 0.85rem 1rem;
        margin: 0;
        border: none;
        background: transparent;
        color: var(--text);
        white-space: pre;
        overflow: auto;
        outline: none;
        resize: none;
      }
      pre.error { color: var(--error); white-space: pre-wrap; }
      textarea::placeholder { color: var(--muted); }

      @media (max-width: 800px) {
        main { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
      }
    </style>
  </head>
  <body>
    <header>
      <img class="logo" src="./nix-snowflake.svg" alt="Nix snowflake" />
      <div class="title">
        <span class="name">nixfmt<b>-rs</b></span>
        <span class="sub">WebAssembly playground</span>
      </div>
      <span class="spacer"></span>
      <a href="https://github.com/joerg/nixfmt-rs" target="_blank" rel="noopener">github</a>
    </header>

    <div class="controls">
      <label>width <input type="number" id="width" value="100" min="1" max="500" /></label>
      <label>indent <input type="number" id="indent" value="2" min="0" max="16" /></label>
      <label><input type="checkbox" id="auto" checked /> format on input</label>
      <button id="run" type="button">format</button>
      <span class="status loading" id="status"><span class="dot"></span>loading wasm…</span>
    </div>

    <main>
      <section class="pane input">
        <div class="pane-header">input.nix</div>
        <textarea id="input" spellcheck="false" placeholder="paste Nix here">
{ pkgs ? import &lt;nixpkgs&gt; {} }: let x =     1; in pkgs.hello
</textarea>
      </section>
      <section class="pane output">
        <div class="pane-header">formatted</div>
        <pre id="output"></pre>
      </section>
    </main>

    <script type="module">
      import init, { format_with } from "./pkg/nixfmt_wasm.js";

      const $ = (id) => document.getElementById(id);
      const input = $("input");
      const output = $("output");
      const status = $("status");
      const widthEl = $("width");
      const indentEl = $("indent");
      const autoEl = $("auto");

      function setStatus(text, kind) {
        status.className = "status " + (kind || "");
        status.innerHTML = '<span class="dot"></span>' + text;
      }

      function run() {
        const width = Math.max(1, +widthEl.value || 100);
        const indent = Math.max(0, +indentEl.value || 2);
        const t0 = performance.now();
        try {
          output.textContent = format_with(input.value, width, indent);
          output.classList.remove("error");
          const dt = (performance.now() - t0).toFixed(2);
          const bytes = new TextEncoder().encode(input.value).length;
          setStatus(`formatted ${bytes} B in ${dt} ms`, "ready");
        } catch (e) {
          output.textContent = String(e.message ?? e);
          output.classList.add("error");
          setStatus("parse error", "error");
        }
      }

      $("run").addEventListener("click", run);
      for (const el of [input, widthEl, indentEl]) {
        el.addEventListener("input", () => {
          if (autoEl.checked) run();
        });
      }

      try {
        await init();
        setStatus("ready", "ready");
        run();
      } catch (e) {
        setStatus("failed to load wasm: " + (e.message ?? e), "error");
      }
    </script>
  </body>
</html>
