<?xml version="1.0" encoding="UTF-8"?>
<!--
  Adapted from NixOS/nixos-artwork (CC-BY-4.0):
    https://github.com/NixOS/nixos-artwork/blob/master/logo/nix-snowflake-colours.svg
  Recolored: 3 lambdas in Nix blue, 3 in Rust orange to evoke "nixfmt + rust".
-->
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 501.56251 501.56249" width="535" height="535">
  <defs>
    <linearGradient id="nix-light" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#699ad7"/>
      <stop offset="0.5" stop-color="#7eb1dd"/>
      <stop offset="1"   stop-color="#7ebae4"/>
    </linearGradient>
    <linearGradient id="nix-dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#415e9a"/>
      <stop offset="0.5" stop-color="#4a6baf"/>
      <stop offset="1"   stop-color="#5277c3"/>
    </linearGradient>
    <linearGradient id="rust-light" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#f4b88a"/>
      <stop offset="0.5" stop-color="#eea170"/>
      <stop offset="1"   stop-color="#e88a4e"/>
    </linearGradient>
    <linearGradient id="rust-dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#a8351a"/>
      <stop offset="0.5" stop-color="#c44320"/>
      <stop offset="1"   stop-color="#ce5a1f"/>
    </linearGradient>

    <!--
      Single lambda glyph, defined once at rotation 0°. The whole flake is
      built by rotating this 6× around the center (407.3, -715.8) which is
      then mapped into the viewBox by the parent transform.
    -->
    <path id="lambda"
          d="m 309.54892,-710.38827 122.19683,211.67512 -56.15706,0.5268 -32.6236,-56.8692 -32.85645,56.5653 -27.90237,-0.011 -14.29086,-24.6896 46.81047,-80.4901 -33.22946,-57.8257 z"/>
  </defs>

  <g transform="translate(-156.41121,933.30685)">
    <g transform="matrix(0.99994059,0,0,0.99994059,-0.06321798,33.188377)">
      <!-- Alternating: blue / orange / blue / orange / blue / orange -->
      <use href="#lambda" fill="url(#nix-light)"/>
      <use href="#lambda" fill="url(#rust-light)" transform="rotate(60,407.11155,-715.78724)"/>
      <use href="#lambda" fill="url(#nix-dark)"   transform="rotate(120,407.33916,-716.08356)"/>
      <use href="#lambda" fill="url(#rust-dark)"  transform="rotate(180,407.41868,-715.7565)"/>
      <use href="#lambda" fill="url(#nix-dark)"   transform="rotate(-120,407.28823,-715.86995)"/>
      <use href="#lambda" fill="url(#rust-light)" transform="rotate(-60,407.31177,-715.70016)"/>
    </g>
  </g>
</svg>
