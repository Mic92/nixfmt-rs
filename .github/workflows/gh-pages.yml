name: Deploy wasm playground to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deploy; cancel in-progress runs but let queued
# completions finish so we don't drop a release mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: NixOS/nix-installer-action@main
      - name: Build wasm package
        run: nix build .#wasm -L

      - name: Assemble site
        run: |
          mkdir -p site/pkg
          cp -r web/. site/
          cp -r result/pkg/. site/pkg/
          # GitHub Pages serves wasm with the right MIME type out of the box,
          # but disable Jekyll so files starting with `_` are kept as-is.
          touch site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
