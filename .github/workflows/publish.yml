name: Publish to crates.io

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    # Configure this environment on crates.io (Settings → Trusted Publishing)
    # and optionally add protection rules in the GitHub repo settings.
    environment: release
    permissions:
      contents: read
      id-token: write # OIDC token exchange with crates.io
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches Cargo.toml version
        if: github.event_name == 'release'
        run: |
          manifest=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "nixfmt_rs") | .version')
          tag="${GITHUB_REF_NAME#v}"
          if [ "$manifest" != "$tag" ]; then
            echo "::error::Cargo.toml version ($manifest) does not match tag ($tag)"
            exit 1
          fi

      - uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish
        run: cargo publish -p nixfmt_rs --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  npm:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write # npm provenance / trusted publishing
    steps:
      - uses: actions/checkout@v6
      - uses: NixOS/nix-installer-action@main
      - run: nix build -L .#wasm
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Publish
        # Writable copy so npm can stage its tarball. Auth is tokenless via
        # npm Trusted Publishing (OIDC); configure on npmjs.com after the
        # initial manual `npm publish`.
        run: |
          cp -r result/npm dist
          cd dist
          npm publish --provenance --access public
